name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-dbt-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      # Safely write multi-line JSON using standard environment context to /tmp/
      - name: Set up GCP Credentials File
        run: |
          echo "$GCP_SA_KEY" > /tmp/bigquery_key.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      # Create standard dbt directory and write a clean profile with an absolute /tmp/ path
      - name: Set up dbt Profiles Directory
        run: |
          mkdir -p ~/.dbt
          echo "
          dbt_project:
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: travelpulse-analytics
                dataset: analytics
                location: US
                threads: 4
                keyfile: /tmp/bigquery_key.json
            target: dev
          " > ~/.dbt/profiles.yml

      - name: Verify dbt Connection
        run: dbt debug
        working-directory: ./dbt_project

      - name: Execute dbt Compilation and Testing
        run: dbt build
        working-directory: ./dbt_project